<div class="lupino-page">

	<app-character-filters
		(filtersChange)="onFiltersChange($event)"
		(searchChange)="onSearchChange($event)"
		[races]="(races$ | async) ?? []"
		[resultsCount]="(characters$ | async)?.length || 0"
		[showAdminFilters]="((currentUser$ | async)?.isAdmin && !isMyCharacterPage) ?? false">
	</app-character-filters>

	<div class="container lupino-container">
		<!-- Message si aucun personnage -->
		@if (characters$ | async; as characters) {
			@if (characters.length === 0) {
				<div class="lupino-empty-state">
					<div class="lupino-empty-icon">🎭</div>
					<div class="lupino-empty-text">Aucun personnage... mais vous pouvez en créer un !</div>
				</div>
			}
			<!-- Bouton de création -->
			@if (isMyCharacterPage) {
				<div class="d-flex justify-content-end mb-4">
					<button class="btn lupino-create-btn" (click)="createNewCharacter()">
						<i class="fas fa-plus me-2"></i>Créer un nouveau personnage
					</button>
				</div>
			}
			<!-- Liste -->
			@if (characters.length > 0) {
				<div class="row g-4">
					@for (character of characters; track character) {
						<div class="col-lg-3 col-md-4 col-sm-6 col-12">
							<app-character-card
								[character]="character"
								[raceMap]="(raceMap$ | async)! "
								[isMyCharacterPage]="isMyCharacterPage"
								[isAdmin]="(currentUser$ | async)?.isAdmin ?? false"
								(delete)="openDeleteModal($event)">
							</app-character-card>
						</div>
					}
				</div>
			}
		} @else {
			<div class="lupino-loading">
				<div class="lupino-spinner"></div>
				<p class="lupino-loading-text">Chargement des personnages...</p>
			</div>
		}
	</div>
</div>
