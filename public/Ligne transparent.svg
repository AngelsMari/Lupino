<?xml version="1.0" encoding="UTF-8"?>
<svg preserveAspectRatio="xMidYMid meet"
	 viewBox="0 0 200 20"
	 xmlns="http://www.w3.org/2000/svg">

	<defs>
		<!-- Mask: la ligne est visible (blanc) sauf sous les cercles (noir) -->
		<mask id="cutLine">
			<rect fill="black" height="20" width="200" x="0" y="0" />
			<rect fill="white" height="2" width="168" x="16" y="9" />
			<!-- un poil plus grand que le cercle pour être sûr de couper net -->
			<circle cx="10" cy="10" fill="black" r="7" />
			<circle cx="190" cy="10" fill="black" r="7" />
		</mask>
	</defs>

	<!-- Ligne (rect rempli = rendu stable) -->
	<rect fill="#ffb65f" height="2" mask="url(#cutLine)" width="168"
		  x="16"
		  y="9" />

	<!-- Cercles par-dessus -->
	<circle cx="10" cy="10" fill="none"
			r="6"
			stroke="#ffb65f"
			stroke-width="2" />

	<circle cx="190" cy="10" fill="none"
			r="6"
			stroke="#ffb65f"
			stroke-width="2" />
</svg>
